# Ansible Playbook: 安装Nginx + Zabbix Agent
# 用法: ansible-playbook -i hosts site.yml

---
- name: Install Nginx on all clients
  hosts: web,db
  become: yes
  tasks:
    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

- name: Install Zabbix Agent on all clients
  hosts: web,db
  become: yes
  tasks:
    - name: Install Zabbix repo
      yum:
        name: "https://repo.zabbix.com/zabbix/6.0/rhel/9/x86_64/zabbix-release-6.0-4.el9.noarch.rpm"
        state: present

    - name: Install Zabbix Agent
      dnf:
        name: zabbix-agent
        state: present

    - name: Configure Zabbix Agent Server
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Server='
        line: 'Server=192.168.50.10'

    - name: Start Zabbix Agent
      systemd:
        name: zabbix-agent
        state: started
        enabled: yes
