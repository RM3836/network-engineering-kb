# Zabbix 6.0 一键部署 (Docker Compose)
# 用法: docker compose -f docker-compose-zabbix.yml up -d
# 访问: http://192.168.50.10 (Admin / zabbix)

version: '3.8'

services:
  zabbix-server:
    image: zabbix/zabbix-server-mysql:6.0-latest
    container_name: zabbix-server
    restart: always
    environment:
      DB_SERVER_HOST: mysql-server
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_pwd
      ZBX_CACHESIZE: 512M
    ports:
      - "10051:10051"
    networks:
      - zabbix-net
    depends_on:
      - mysql-server

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:6.0-latest
    container_name: zabbix-web
    restart: always
    environment:
      DB_SERVER_HOST: mysql-server
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_pwd
      ZBX_SERVER_HOST: zabbix-server
    ports:
      - "80:8080"
    depends_on:
      - zabbix-server
    networks:
      - zabbix-net

  mysql-server:
    image: mysql:8.0
    container_name: mysql-server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_pwd
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - zabbix-net

networks:
  zabbix-net:
    driver: bridge

volumes:
  mysql_data:
